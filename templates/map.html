<!DOCTYPE html>
<html>
<head>
    <title>Map - Tirana Deal Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        #map { height: 600px; }
    </style>
</head>
<body>
<nav>
    <a href="/">Home</a> |
    <a href="/analytics">Analytics</a> |
    <a href="/map">Map</a>
</nav>
    <h1>Tirana Listings Map</h1>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([41.3275, 19.8187], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const listings = {{ listings | tojson }};

        const avgPpsqm = listings.reduce((sum, l) => sum + (l.price / l.sqm), 0) / listings.length;

        listings.forEach(listing => {
            const ppsqm = listing.price / listing.sqm;
            const color = ppsqm < avgPpsqm ? "green" : "red";

            L.circleMarker([listing.lat, listing.lng], {
                radius: 8,
                color: color,
                fillColor: color,
                fillOpacity: 0.7
            })
                .addTo(map)
                .bindPopup(`Price: ${listing.price} EUR<br>Neighborhood: ${listing.neighborhood}`);
        });
    </script>
</body>
</html>
