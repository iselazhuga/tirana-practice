<!DOCTYPE html>
<html>
<head>
    <title>Analytics - Tirana Deal Finder</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav>
    <a href="/">Home</a> |
    <a href="/analytics">Analytics</a> |
    <a href="/map">Map</a>
</nav>
    <h1>Market Analytics</h1>
    <p>Average Price: {{ stats.avg_price }} EUR</p>
    <p>Average Price per Sqm: {{ stats.avg_ppsqm }} EUR/m²</p>

    <h2>Listings by Bedroom Count</h2>
    <canvas id="bedroomChart" width="400" height="200"></canvas>

    <script>
        const labels = {{ stats.by_bedrooms.keys() | list | tojson }};
        const data = {{ stats.by_bedrooms.values() | list | tojson }};

        new Chart(document.getElementById('bedroomChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Number of Listings',
                    data: data,
                    backgroundColor: '#2980b9'
                }]
            }
        });
    </script>

    <h2>Price Distribution</h2>
    <canvas id="priceHistogram" width="400" height="200"></canvas>

    <script>
        const prices = {{ stats.prices | tojson }};

        new Chart(document.getElementById('priceHistogram'), {
            type: 'bar',
            data: {
                labels: prices.map((p, i) => i + 1),
                datasets: [{
                    label: 'Price (EUR)',
                    data: prices,
                    backgroundColor: '#e67e22'
                }]
            }
        });
    </script>
</body>
</html>
